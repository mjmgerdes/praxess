[build]
# Dockerfile at the repo root handles the full multi-stage build:
# Node 20 builds the React frontend, then Python 3.12 serves it via FastAPI.
# Railway detects the Dockerfile automatically and ignores Railpack.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
